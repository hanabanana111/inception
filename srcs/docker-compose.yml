version: '3.8'

services:
  nginx:
    build:
      context: ./requirements/nginx
    container_name: nginx
    env_file:
      - .env
    extra_hosts:
      - "wordpress:127.0.0.1"
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    restart: always

volumes:
  wordpress_data:
